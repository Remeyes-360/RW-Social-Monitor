  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0e1a; font-family: 'IBM Plex Sans', sans-serif; color: #c8d8f0; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0e1a; }
    ::-webkit-scrollbar-thumb { background: #1c2640; border-radius: 2px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes modalIn { from{opacity:0;transform:translateY(20px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
  </style>
</head>
<body>

      { day: "25/02", wadagni: 3200, talon: 2800, co: 420 },
      { day: "26/02", wadagni: 4100, talon: 3100, co: 580 },
      { day: "27/02", wadagni: 3800, talon: 2900, co: 510 },
      { day: "28/02", wadagni: 5200, talon: 3400, co: 720 },
      { day: "01/03", wadagni: 4700, talon: 3200, co: 650 },
      { day: "02/03", wadagni: 6100, talon: 3600, co: 890 },
      { day: "03/03", wadagni: 14630, talon: 4200, co: 1240 },
    ];

    const alerts = [
      {

        publication: {
          auteur: "@benin_truth_now", abonnes: "23.4K abonnés", date: "03 Mar 2026 · 14:18",
          contenu: "🚨 SCANDALE : Des sources fiables confirment que la campagne de Wadagni est financée par des fonds étrangers non déclarés. Des virements de plusieurs millions de FCFA en provenance de comptes offshore ont été identifiés. Le peuple béninois mérite la vérité ! Partagez massivement avant censure. #Benin2026 #Wadagni #Corruption",
          likes: "4 821", partages: "2 103", commentaires: "987", sentiment: "anti",
          statut: "Viral · En cours de propagation", url: "#",
        }
      },
      {
        time: "11:15", level: "ALERTE", platform: "Facebook",
        msg: "Rumeur santé candidate propagée dans 3 groupes Facebook (>50K membres)",
        publication: {
          auteur: "Groupe Bénin Politique Libre", abonnes: "52K membres", date: "03 Mar 2026 · 11:02",
          contenu: "⚠️ Information importante que les médias taisent : Wadagni souffrirait d'une maladie grave qui l'empêcherait d'exercer pleinement ses fonctions présidentielles. Des proches de l'entourage médical ont confirmé sous anonymat. Est-ce qu'un candidat malade peut diriger le Bénin ? Donnez votre avis 👇",
          likes: "1 243", partages: "876", commentaires: "432", sentiment: "anti",
          statut: "Propagation active · 3 groupes identifiés", url: "#",

      },
      {

        msg: "Hausse organique mentions positives après discours Parakou (+28%)",
        publication: {
          auteur: "@parakou_actu", abonnes: "18.7K abonnés", date: "03 Mar 2026 · 09:31",
          contenu: "Le discours de Wadagni à Parakou ce matin était historique. Il a présenté un plan concret pour le développement du Nord : 500 km de routes, 3 nouveaux hôpitaux, doublement du budget éducation. Enfin un candidat qui parle aux vrais besoins du peuple ! 🇧🇯 #Bénin2026 #Wadagni #Parakou",
          likes: "2 891", partages: "1 432", commentaires: "654", sentiment: "pro",
          statut: "Engagement positif · Trending Parakou", url: "#",
        }
      },
      {
        time: "08:20", level: "INFO", platform: "Presse",
        msg: "Article positif La Nation — 1.2K partages en 2h",
        publication: {
          auteur: "La Nation — Bénin", abonnes: "lanation.bj", date: "03 Mar 2026 · 08:05",
          contenu: "ÉCONOMIE | Romuald Wadagni présente son programme de transformation économique pour le Bénin à l'horizon 2030. L'ancien ministre des Finances détaille ses priorités : diversification économique, attraction des investissements étrangers, et renforcement des filières agricoles. Un programme salué par plusieurs économistes consultés.",
          likes: "543", partages: "1 201", commentaires: "89", sentiment: "pro",
          statut: "Diffusion organique · Presse nationale", url: "#",
        }
      },
    ];

    /* ── helpers ── */
    const levelColor = l => l === "CRITIQUE" ? C.red : l === "ALERTE" ? C.yellow : C.accent;
    const sentColor  = s => s === "pro" ? C.green : s === "anti" ? C.red : C.accent;

    function Badge({ level }) {
      const col = levelColor(level);
      return (
        <span style={{ background: col+"22", color: col, border:`1px solid ${col}44`,
          borderRadius:4, padding:"2px 8px", fontSize:10,
          fontFamily:"'Space Mono',monospace", letterSpacing:"0.05em", whiteSpace:"nowrap" }}>
          {level}
        </span>
      );
    }

    function StatCard({ label, value, sub, color, pulse: p }) {
      return (
        <div style={{ background:C.card, border:`1px solid ${color}33`, borderRadius:12,
          padding:"20px 24px", position:"relative", overflow:"hidden" }}>
          {p && <span style={{ position:"absolute", top:14, right:14, width:8, height:8,
            borderRadius:"50%", background:color, boxShadow:`0 0 8px ${color}`,
            animation:"pulse 1.5s infinite", display:"inline-block" }} />}
          <div style={{ color:C.textDim, fontSize:11, letterSpacing:"0.1em",
            textTransform:"uppercase", marginBottom:8 }}>{label}</div>
          <div style={{ color, fontSize:32, fontFamily:"'Space Mono',monospace",
            fontWeight:700, letterSpacing:"-1px" }}>{value}</div>
          {sub && <div style={{ color:C.textDim, fontSize:12, marginTop:4 }}>{sub}</div>}
          <div style={{ position:"absolute", bottom:0, left:0, right:0, height:2,
            background:`linear-gradient(90deg,transparent,${color}66,transparent)` }} />
        </div>
      );
    }

    function Modal({ alert, onClose }) {
      if (!alert) return null;
      const p   = alert.publication;
      const lc  = levelColor(alert.level);
      const sc  = sentColor(p.sentiment);
      return (
        <div onClick={onClose} style={{ position:"fixed", inset:0, zIndex:1000,
          background:"rgba(5,8,20,0.88)", backdropFilter:"blur(6px)",
          display:"flex", alignItems:"center", justifyContent:"center",
          padding:24, animation:"fadeIn 0.2s ease" }}>
          <div onClick={e => e.stopPropagation()} style={{ background:C.card,
            border:`1px solid ${lc}55`, borderTop:`3px solid ${lc}`,
            borderRadius:16, width:"100%", maxWidth:640, padding:32,
            animation:"modalIn 0.25s ease", position:"relative", maxHeight:"90vh", overflowY:"auto" }}>

            {/* close */}
            <button onClick={onClose} style={{ position:"absolute", top:16, right:16,
              background:C.bg, border:`1px solid ${C.border}`, color:C.textDim,
              borderRadius:6, width:28, height:28, cursor:"pointer",
              fontSize:14, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>

            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:20 }}>
              <Badge level={alert.level} />
              <span style={{ color:C.textDim, fontSize:11, fontFamily:"'Space Mono',monospace" }}>
                {alert.time} · {alert.platform}
              </span>
            </div>
            <div style={{ fontSize:13, color:C.text, marginBottom:24, lineHeight:1.6 }}>{alert.msg}</div>
            <div style={{ height:1, background:C.border, marginBottom:24 }} />
            <div style={{ fontSize:10, color:C.textDim, letterSpacing:"0.1em",
              textTransform:"uppercase", marginBottom:14 }}>Publication incriminante</div>

            <div style={{ background:C.bg, border:`1px solid ${C.border}`, borderRadius:12, padding:20 }}>
              {/* auteur */}
              <div style={{ display:"flex", justifyContent:"space-between",
                alignItems:"flex-start", marginBottom:14 }}>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <div style={{ width:38, height:38, borderRadius:"50%",
                    background:`linear-gradient(135deg,${sc}44,${sc}22)`,
                    border:`1px solid ${sc}44`,
                    display:"flex", alignItems:"center", justifyContent:"center", fontSize:16 }}>👤</div>
                  <div>
                    <div style={{ fontSize:13, fontWeight:600, color:C.text }}>{p.auteur}</div>
                    <div style={{ fontSize:11, color:C.textDim }}>{p.abonnes}</div>
                  </div>
                </div>
                <div style={{ textAlign:"right" }}>
                  <div style={{ fontSize:10, color:C.textDim }}>{p.date}</div>
                  <div style={{ marginTop:4, background:sc+"22", color:sc,
                    border:`1px solid ${sc}44`, borderRadius:4, padding:"2px 8px",
                    fontSize:10, fontFamily:"'Space Mono',monospace" }}>
                    {p.sentiment.toUpperCase()}
                  </div>
                </div>
              </div>

              {/* texte */}
              <div style={{ fontSize:13, lineHeight:1.7, color:C.text,
                background:C.card, borderRadius:8, padding:16, marginBottom:16,
                borderLeft:`3px solid ${sc}66` }}>{p.contenu}</div>

              {/* stats */}
              <div style={{ display:"flex", gap:20, marginBottom:14, flexWrap:"wrap" }}>
                {[["❤️", p.likes, "Likes"], ["🔁", p.partages, "Partages"], ["💬", p.commentaires, "Commentaires"]].map(([icon, val, lbl]) => (
                  <div key={lbl} style={{ display:"flex", alignItems:"center", gap:6 }}>
                    <span style={{ fontSize:13 }}>{icon}</span>
                    <span style={{ fontFamily:"'Space Mono',monospace", fontSize:12, color:C.accent }}>{val}</span>
                    <span style={{ fontSize:10, color:C.textDim }}>{lbl}</span>
                  </div>
                ))}
              </div>

              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:8 }}>
                <div style={{ fontSize:11, color:C.yellow, background:C.yellow+"15",
                  border:`1px solid ${C.yellow}33`, borderRadius:4, padding:"3px 10px" }}>
                  ⚡ {p.statut}
                </div>
                <span style={{ fontSize:11, color:C.accent, fontFamily:"'Space Mono',monospace" }}>
                  Source : {alert.platform}
                </span>
              </div>
            </div>

            {/* actions */}
            <div style={{ display:"flex", gap:10, marginTop:20, flexWrap:"wrap" }}>
              {["📋 Copier", "📄 Note de crise", "🚩 Marquer traitée"].map(a => (
                <button key={a} onClick={() => alert(a + " (fonctionnalité à brancher sur le backend)")}
                  style={{ flex:1, minWidth:120, background:C.bg, border:`1px solid ${C.border}`,
                    color:C.textDim, borderRadius:8, padding:"8px 12px",
                    fontSize:11, cursor:"pointer" }}>{a}</button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════ APP ══════════════════ */
    function App() {
      const [tab, setTab]           = useState("overview");

      useEffect(() => {

            padding:"0 24px", display:"flex", alignItems:"center",
            justifyContent:"space-between", height:60, position:"sticky", top:0, zIndex:50 }}>

            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <div style={{ width:36, height:36, borderRadius:8,
                background:`linear-gradient(135deg,${C.accent},#0066cc)`,
                display:"flex", alignItems:"center", justifyContent:"center",
                fontFamily:"'Space Mono',monospace", fontWeight:700, fontSize:14, color:"#fff" }}>RW</div>
              <div>
                <div style={{ fontWeight:600, fontSize:14 }}>RW Social Monitor</div>
                <div style={{ color:C.textDim, fontSize:9, letterSpacing:"0.08em" }}>
                  VEILLE STRATÉGIQUE · BÉNIN 2026
                </div>
              </div>
            </div>

            <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
              {tabs.map(t => (
                <button key={t} onClick={() => setTab(t)} style={{
                  background: tab===t ? C.accent+"22" : "transparent",
                  border:`1px solid ${tab===t ? C.accent+"66" : "transparent"}`,
                  color: tab===t ? C.accent : C.textDim,
                  borderRadius:6, padding:"5px 12px", fontSize:10,
                  fontFamily:"'Space Mono',monospace", cursor:"pointer",
                  textTransform:"uppercase", letterSpacing:"0.06em" }}>{t}</button>
              ))}
            </div>

            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <span style={{ width:6, height:6, borderRadius:"50%", background:C.green,
                boxShadow:`0 0 8px ${C.green}`, animation:"pulse 1.5s infinite",
                display:"inline-block" }} />
              <span style={{ color:C.textDim, fontSize:11,
                fontFamily:"'Space Mono',monospace" }}>{time.toLocaleTimeString("fr-FR")}</span>
              <div style={{ background:"#ff446622", border:"1px solid #ff446644",
                borderRadius:6, padding:"4px 10px", color:"#ff4466",
                fontSize:10, fontFamily:"'Space Mono',monospace" }}>⚠ 2 ALERTES</div>
            </div>
          </div>

          {/* ── content ── */}
          <div style={{ padding:"28px 24px", animation:"slideIn 0.4s ease" }}>

            {/* OVERVIEW */}
            {tab === "overview" && (
              <div style={{ display:"flex", flexDirection:"column", gap:24 }}>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:16 }}>
                  <StatCard label="Mentions aujourd'hui" value={count.toLocaleString("fr-FR")} sub="↑ 140% vs hier" color={C.accent} pulse />
                  <StatCard label="Score sentiment"      value="47%"  sub="Positif dominant"         color={C.green} />
                  <StatCard label="Co-mentions Talon"    value="1 240" sub="8.5% des mentions"       color={C.yellow} />
                  <StatCard label="Portée estimée"       value="2.3M"  sub="Comptes uniques touchés" color="#aa88ff" />
                </div>

                <div style={{ display:"grid", gridTemplateColumns:"2fr 1fr", gap:16 }}>
                  <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:24 }}>
                    <div style={{ fontSize:13, fontWeight:600, marginBottom:4 }}>Volume mentions — 7 jours</div>
                    <div style={{ color:C.textDim, fontSize:11, marginBottom:16 }}>Toutes plateformes</div>
                    <ResponsiveContainer width="100%" height={200}>
                      <AreaChart data={mentionsData}>
                        <defs>
                          <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="5%"  stopColor={C.green} stopOpacity={0.3}/>
                            <stop offset="95%" stopColor={C.green} stopOpacity={0}/>
                          </linearGradient>
                          <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="5%"  stopColor={C.red} stopOpacity={0.3}/>
                            <stop offset="95%" stopColor={C.red} stopOpacity={0}/>
                          </linearGradient>
                        </defs>
                        <CartesianGrid stroke={C.border} strokeDasharray="3 3"/>
                        <XAxis dataKey="day" stroke={C.muted} tick={{ fontSize:10, fill:C.textDim }}/>
                        <YAxis stroke={C.muted} tick={{ fontSize:10, fill:C.textDim }}/>
                        <Tooltip contentStyle={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:8, fontSize:11 }}/>
                        <Area type="monotone" dataKey="positif" stroke={C.green} fill="url(#gP)" strokeWidth={2}/>
                        <Area type="monotone" dataKey="negatif" stroke={C.red}   fill="url(#gN)" strokeWidth={2}/>
                        <Area type="monotone" dataKey="neutre"  stroke={C.accent} fill="none" strokeWidth={1} strokeDasharray="4 4"/>
                      </AreaChart>
                    </ResponsiveContainer>
                  </div>

                  <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:24 }}>
                    <div style={{ fontSize:13, fontWeight:600, marginBottom:4 }}>Répartition sentiment</div>
                    <div style={{ color:C.textDim, fontSize:11, marginBottom:12 }}>Aujourd'hui</div>
                    <ResponsiveContainer width="100%" height={150}>
                      <PieChart>
                        <Pie data={sentimentPie} cx="50%" cy="50%" innerRadius={40} outerRadius={65} paddingAngle={3} dataKey="value">
                          {sentimentPie.map((e,i) => <Cell key={i} fill={e.color}/>)}
                        </Pie>
                        <Tooltip contentStyle={{ background:C.card, border:`1px solid ${C.border}`, fontSize:11 }}/>
                      </PieChart>
                    </ResponsiveContainer>
                    {sentimentPie.map(s => (
                      <div key={s.name} style={{ display:"flex", justifyContent:"space-between", marginTop:8 }}>
                        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                          <div style={{ width:8, height:8, borderRadius:"50%", background:s.color }}/>
                          <span style={{ fontSize:12, color:C.textDim }}>{s.name}</span>
                        </div>
                        <span style={{ fontFamily:"'Space Mono',monospace", fontSize:12, color:s.color }}>{s.value}%</span>
                      </div>
                    ))}
                  </div>
                </div>

                <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:24 }}>
                  <div style={{ fontSize:13, fontWeight:600, marginBottom:20 }}>Mentions par plateforme — 24h</div>
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:12 }}>
                    {platforms.map(p => (
                      <div key={p.name} style={{ background:C.bg, border:`1px solid ${p.color}33`,
                        borderRadius:10, padding:"16px 8px", textAlign:"center" }}>
                        <div style={{ fontSize:20, marginBottom:8 }}>{p.icon}</div>
                        <div style={{ fontSize:10, color:C.textDim, marginBottom:6 }}>{p.name}</div>
                        <div style={{ fontFamily:"'Space Mono',monospace", fontSize:15,
                          fontWeight:700, color:p.color }}>{p.mentions.toLocaleString()}</div>
                        <div style={{ fontSize:10, marginTop:4,
                          color:p.delta > 0 ? C.green : C.red }}>
                          {p.delta > 0 ? "↑" : "↓"}{Math.abs(p.delta)}%
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* SENTIMENT */}
            {tab === "sentiment" && (
              <div style={{ display:"flex", flexDirection:"column", gap:24 }}>
                <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:24 }}>
                  <div style={{ fontSize:13, fontWeight:600, marginBottom:4 }}>Évolution sentiment — 7 jours</div>
                  <div style={{ color:C.textDim, fontSize:11, marginBottom:20 }}>Analyse IA GPT-4</div>
                  <ResponsiveContainer width="100%" height={280}>
                    <BarChart data={mentionsData} barGap={2}>
                      <CartesianGrid stroke={C.border} strokeDasharray="3 3"/>
                      <XAxis dataKey="day" stroke={C.muted} tick={{ fontSize:11, fill:C.textDim }}/>
                      <YAxis stroke={C.muted} tick={{ fontSize:11, fill:C.textDim }}/>
                      <Tooltip contentStyle={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:8, fontSize:11 }}/>
                      <Bar dataKey="positif" fill={C.green}  radius={[3,3,0,0]} name="Positif"/>
                      <Bar dataKey="neutre"  fill={C.accent} radius={[3,3,0,0]} name="Neutre"/>
                      <Bar dataKey="negatif" fill={C.red}    radius={[3,3,0,0]} name="Négatif"/>
                    </BarChart>
                  </ResponsiveContainer>
                </div>

                <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:24 }}>
                  <div style={{ fontSize:13, fontWeight:600, marginBottom:20 }}>Co-mentions Wadagni / Talon</div>
                  <ResponsiveContainer width="100%" height={240}>
                    <LineChart data={coMentions}>
                      <CartesianGrid stroke={C.border} strokeDasharray="3 3"/>
                      <XAxis dataKey="day" stroke={C.muted} tick={{ fontSize:10, fill:C.textDim }}/>
                      <YAxis stroke={C.muted} tick={{ fontSize:10, fill:C.textDim }}/>
                      <Tooltip contentStyle={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:8, fontSize:11 }}/>
                      <Line type="monotone" dataKey="wadagni" stroke={C.accent}  strokeWidth={2} dot={{ fill:C.accent, r:3 }} name="Wadagni"/>
                      <Line type="monotone" dataKey="talon"   stroke={C.yellow}  strokeWidth={2} dot={{ fill:C.yellow, r:3 }} name="Talon"/>
                      <Line type="monotone" dataKey="co"      stroke="#aa88ff"   strokeWidth={1} strokeDasharray="4 4" dot={false} name="Co-mentions"/>
                    </LineChart>
                  </ResponsiveContainer>
                </div>
              </div>
            )}

            {/* NARRATIFS */}
            {tab === "narratifs" && (
              <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:24 }}>
                <div style={{ fontSize:13, fontWeight:600, marginBottom:4 }}>Top narratifs détectés</div>
                <div style={{ color:C.textDim, fontSize:11, marginBottom:24 }}>Classés par volume · mis à jour toutes les 15 min</div>
                <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                  {narratifs.map((n,i) => {
                    const sc  = sentColor(n.sentiment);
                    const pct = Math.round((n.count / 2841) * 100);
                    return (
                      <div key={i} style={{ background:C.bg, border:`1px solid ${sc}33`, borderRadius:10, padding:"16px 20px" }}>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                          <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                            <span style={{ background:sc+"22", color:sc, border:`1px solid ${sc}44`,
                              borderRadius:4, padding:"2px 8px", fontSize:10,
                              fontFamily:"'Space Mono',monospace" }}>{n.sentiment.toUpperCase()}</span>
                            <span style={{ fontSize:13, fontWeight:500 }}>{n.label}</span>
                          </div>
                          <div style={{ display:"flex", alignItems:"center", gap:16 }}>
                            <span style={{ fontFamily:"'Space Mono',monospace", color:sc, fontSize:13 }}>{n.count.toLocaleString()}</span>
                            <span style={{ color:n.trend.includes("↑↑") ? C.red : C.textDim, fontSize:14 }}>{n.trend}</span>
                          </div>
                        </div>
                        <div style={{ background:C.border, borderRadius:2, height:3 }}>
                          <div style={{ width:`${pct}%`, height:"100%", background:sc, borderRadius:2 }}/>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* ALERTES */}
            {tab === "alertes" && (
              <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:16, marginBottom:8 }}>
                  <StatCard label="Alertes critiques"  value="2" sub="Dernières 24h"  color={C.red}    pulse />
                  <StatCard label="Alertes modérées"   value="5" sub="Cette semaine"  color={C.yellow} />
                  <StatCard label="Notes de crise"      value="1" sub="03 Mar 2026"   color="#aa88ff" />
                </div>
                <div style={{ color:C.textDim, fontSize:11 }}>
                  Cliquez sur une alerte pour voir la publication complète
                </div>
                {alerts.map((a,i) => (
                  <div key={i} onClick={() => setSelAlert(a)} style={{
                    background:C.card,
                    border:`1px solid ${a.level==="CRITIQUE" ? "#ff446633" : a.level==="ALERTE" ? "#ffd34033" : C.border}`,
                    borderLeft:`3px solid ${levelColor(a.level)}`,
                    borderRadius:10, padding:"16px 20px",
                    display:"flex", alignItems:"center", gap:16,
                    cursor:"pointer", transition:"background 0.2s",
                  }}
                  onMouseEnter={e => e.currentTarget.style.background="#151d35"}
                  onMouseLeave={e => e.currentTarget.style.background=C.card}
                  >
                    <span style={{ fontFamily:"'Space Mono',monospace", color:C.textDim, fontSize:11, minWidth:40 }}>{a.time}</span>
                    <Badge level={a.level}/>
                    <span style={{ flex:1, fontSize:13 }}>{a.msg}</span>
                    <span style={{ color:C.textDim, fontSize:11, background:C.bg, borderRadius:4, padding:"3px 8px" }}>{a.platform}</span>
                    <span style={{ color:C.accent, fontSize:11, whiteSpace:"nowrap" }}>Voir →</span>
                  </div>
                ))}
              </div>
            )}

            {/* COMPTES */}
            {tab === "comptes" && (
              <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:24 }}>
                <div style={{ fontSize:13, fontWeight:600, marginBottom:4 }}>Top comptes moteurs</div>
                <div style={{ color:C.textDim, fontSize:11, marginBottom:24 }}>Classés par score d'influence composite</div>
                <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                  {topComptes.map((c,i) => (
                    <div key={i} style={{ background:C.bg, border:`1px solid ${C.border}`,
                      borderRadius:10, padding:"14px 20px",
                      display:"flex", alignItems:"center", gap:20 }}>
                      <span style={{ fontFamily:"'Space Mono',monospace",
                        color:i===0 ? C.yellow : C.textDim, fontSize:14, minWidth:24 }}>#{i+1}</span>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:13, fontWeight:500, marginBottom:2 }}>{c.handle}</div>
                        <div style={{ fontSize:11, color:C.textDim }}>{c.plateforme} · {c.reach} abonnés</div>
                      </div>
                      <div style={{ textAlign:"right" }}>
                        <div style={{ fontFamily:"'Space Mono',monospace", color:C.accent, fontSize:14 }}>{c.influence}</div>
                        <div style={{ fontSize:10, color:C.textDim }}>influence</div>
                      </div>
                      <div style={{ width:80 }}>
                        <div style={{ background:C.border, borderRadius:2, height:4 }}>
                          <div style={{ width:`${c.influence}%`, height:"100%", background:C.accent, borderRadius:2 }}/>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* modal */}
          <Modal alert={selAlert} onClose={() => setSelAlert(null)}/>

          {/* footer */}
          <div style={{ borderTop:`1px solid ${C.border}`, padding:"12px 24px",
            display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <span style={{ color:C.textDim, fontSize:10, fontFamily:"'Space Mono',monospace" }}>
              RW SOCIAL MONITOR · OUTIL CONFIDENTIEL DE VEILLE STRATÉGIQUE
            </span>
            <span style={{ color:C.textDim, fontSize:10, fontFamily:"'Space Mono',monospace" }}>
              {time.toLocaleString("fr-FR")}
            </span>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
